<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portable AC Pain Points Matrix</title>
<style>
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.10);
  --border-mid: rgba(0,0,0,0.18);
  --text: #0f172a;
  --text-sec: #475569;
  --text-hint: #94a3b8;
  --radius: 12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1117;--surface:#1a1d27;--border:rgba(255,255,255,0.10);
    --border-mid:rgba(255,255,255,0.20);--text:#f0f4ff;
    --text-sec:#94a3b8;--text-hint:#475569;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.page{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
.header{margin-bottom:1.5rem;}
h1{font-size:22px;font-weight:600;color:var(--text);margin-bottom:4px;}
.desc{font-size:13px;color:var(--text-sec);}
.section-label{font-size:10px;font-weight:600;color:var(--text-hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.controls{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;align-items:flex-end;}
.btn-group{display:flex;flex-wrap:wrap;gap:6px;}
button.seg,button.flt{
  font-size:12px;border:1.5px solid var(--border-mid);
  background:var(--surface);color:var(--text-sec);cursor:pointer;
  padding:6px 13px;border-radius:20px;transition:all .15s;
}
button.seg.active,button.flt.active{
  background:#2563eb;border-color:#2563eb;color:#fff;
  font-weight:600;box-shadow:0 0 0 3px rgba(37,99,235,.18);
}
.status{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  margin-bottom:1.25rem;font-size:12px;color:var(--text-sec);
}
.pill{
  background:#EFF6FF;color:#1e40af;
  padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;
}
@media(prefers-color-scheme:dark){.pill{background:#1e2d4d;color:#93c5fd;}}
.chart-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px;margin-bottom:10px;
}
.legend-row{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--text-hint);margin-bottom:2rem;}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle;}
.list-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:13px;
  display:flex;flex-direction:column;gap:8px;
}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.rank-badge{
  font-size:10px;font-weight:700;color:var(--text-sec);
  background:var(--bg);border:1px solid var(--border);
  padding:2px 7px;border-radius:5px;
}
.r-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;}
.r-red{background:#FEF2F2;color:#991b1b;}
.r-amber{background:#FFFBEB;color:#92400e;}
.r-blue{background:#EFF6FF;color:#1e40af;}
@media(prefers-color-scheme:dark){
  .r-red{background:#3d1515;color:#fca5a5;}
  .r-amber{background:#3d2e0a;color:#fcd34d;}
  .r-blue{background:#1e2d4d;color:#93c5fd;}
}
.card-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;min-height:32px;}
.bar-row{display:flex;flex-direction:column;gap:3px;}
.bar-label{display:flex;justify-content:space-between;font-size:9px;color:var(--text-hint);}
.bar-bg{height:4px;background:var(--bg);border-radius:2px;border:1px solid var(--border);overflow:hidden;}
.bar-gray{height:100%;background:#94a3b8;border-radius:2px;}
.bar-blue{height:100%;background:#2563eb;border-radius:2px;}
</style>

// 计算该画像"全部"数据的轴范围和虚线位置
function getAxisConfig(segName) {
  // 用全部27条数据（r>0才有效）
  const all = RAW.map(d => d.segments[segName]).filter(d => d.r > 0);
  const allX = all.map(d => d.x);
  const allY = all.map(d => d.y);

  const maxX = Math.max(...allX);
  const minX = Math.min(...allX);
  const maxY = Math.max(...allY);
  const minY = Math.min(...allY);

  // 坐标轴上限 = 最大值 + 10% padding，向上取整到5的倍数
  const padX = Math.ceil((maxX * 1.12) / 5) * 5;
  const padY = Math.ceil((maxY * 1.12) / 5) * 5;

  // 虚线位置 = 最小值 + (最大值 - 最小值) / 2
  const midX = minX + (maxX - minX) / 2;
  const midY = minY + (maxY - minY) / 2;

  return { domX: padX, domY: padY, midX, midY, maxX, minX, maxY, minY };
}

function getData() {
  let d = RAW.map(it => ({...it, ...it.segments[seg]})).filter(d => d.r > 0).sort((a,b) => b.r - a.r);
  if (flt !== "all") d = d.slice(0, +flt);
  return d;
}

function rColor(r, alpha) {
  if (r >= 4.2) return `rgba(239,68,68,${alpha})`;
  if (r >= 3.9) return `rgba(245,158,11,${alpha})`;
  return `rgba(37,99,235,${alpha})`;
}
function rClass(r) { return r >= 4.2 ? 'r-red' : r >= 3.9 ? 'r-amber' : 'r-blue'; }

function buildBtns() {
  const sc = document.getElementById('segs'); sc.innerHTML = '';
  SEGS.forEach(s => {
    const b = document.createElement('button');
    b.className = 'seg' + (s === seg ? ' active' : '');
    b.textContent = s;
    b.onclick = () => { seg = s; refresh(); };
    sc.appendChild(b);
  });
  const fc = document.getElementById('filters'); fc.innerHTML = '';
  FLTS.forEach(f => {
    const b = document.createElement('button');
    b.className = 'flt' + (f.v === flt ? ' active' : '');
    b.textContent = f.l;
    b.onclick = () => { flt = f.v; refresh(); };
    fc.appendChild(b);
  });
}

function updateStatus(data, cfg) {
  document.getElementById('sSeg').textContent = seg;
  document.getElementById('sFlt').textContent = flt === 'all' ? `全部 ${data.length} 个痛点` : `Top ${data.length} 个`;
  document.getElementById('sAxis').textContent =
    `X轴 0–${cfg.domX}% · Y轴 0–${cfg.domY}% · 象限中点 X=${cfg.midX.toFixed(1)}% Y=${cfg.midY.toFixed(1)}%`;
  document.getElementById('listTitle').textContent =
    `优先级清单 — ${seg} · ${flt === 'all' ? `全部 ${data.length} 项` : `Top ${data.length} 项`} · 按 R 值排序`;
}

function resolveOverlaps(labels) {
  for (let it = 0; it < 150; it++) {
    let moved = false;
    for (let i = 0; i < labels.length; i++) {
      for (let j = i + 1; j < labels.length; j++) {
        const a = labels[i], b = labels[j];
        const ox = (a.w/2 + b.w/2 + 2) - Math.abs(a.lx - b.lx);
        const oy = (a.h/2 + b.h/2 + 2) - Math.abs(a.ly - b.ly);
        if (ox > 0 && oy > 0) {
          const dx = a.lx - b.lx || .01, dy = a.ly - b.ly || .01;
          const d = Math.sqrt(dx*dx + dy*dy) || 1;
          a.lx += (ox/2)*(dx/d); a.ly += (oy/2)*(dy/d);
          b.lx -= (ox/2)*(dx/d); b.ly -= (oy/2)*(dy/d);
          moved = true;
        }
      }
    }
    if (!moved) break;
  }
}

function buildChart(data, cfg) {
  const dark = isDark();
  const { domX, domY, midX, midY } = cfg;

  const pts = data.map(d => ({
    x: d.x, y: d.y,
    r: 5 + (d.r - 1) * 7,
    label: d.name, rVal: d.r
  }));

  const gc = dark ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.06)';
  const tc = dark ? '#94a3b8' : '#64748b';
  const lc = dark ? 'rgba(220,235,255,.85)' : 'rgba(10,20,50,.78)';
  const cc = dark ? 'rgba(148,163,184,.3)' : 'rgba(71,85,105,.25)';

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('mc'), {
    type: 'bubble',
    data: { datasets: [{ data: pts,
      backgroundColor: pts.map(p => rColor(p.rVal, .72)),
      borderColor: pts.map(p => rColor(p.rVal, .9)),
      borderWidth: pts.map(p => p.rVal >= 4.2 ? 2 : 1)
    }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 30, right: 30, bottom: 10, left: 10 } },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => {
          const d = ctx.raw;
          return [d.label, `普及率: ${d.x}%`, `严重性: ${d.y}%`, `R值: ${d.rVal.toFixed(2)}`];
        }}, padding: 10, bodyFont: { size: 12 }}
      },
      scales: {
        x: { min: 0, max: domX,
          title: { display: true, text: '普遍性 (普及率 %)', color: tc, font: { size: 12, weight: '600' }},
          ticks: { color: tc, font: { size: 11 }}, grid: { color: gc }},
        y: { min: 0, max: domY,
          title: { display: true, text: '严重性 (提及率 %)', color: tc, font: { size: 12, weight: '600' }},
          ticks: { color: tc, font: { size: 11 }}, grid: { color: gc }}
      }
    },
    plugins: [{
      id: 'refs',
      afterDraw(ch) {
        const c2 = ch.ctx, { chartArea: ca, scales: {x, y} } = ch;
        c2.save();
        c2.setLineDash([5, 5]); c2.strokeStyle = '#6366f1'; c2.lineWidth = 1.5;
        const px = x.getPixelForValue(midX), py = y.getPixelForValue(midY);
        c2.beginPath(); c2.moveTo(px, ca.top); c2.lineTo(px, ca.bottom); c2.stroke();
        c2.beginPath(); c2.moveTo(ca.left, py); c2.lineTo(ca.right, py); c2.stroke();
        c2.setLineDash([]);
        c2.font = '600 10px sans-serif'; c2.fillStyle = '#6366f1';
        c2.fillText(`中点 ${midX.toFixed(1)}%`, px + 4, ca.top + 12);
        c2.fillText(`中点 ${midY.toFixed(1)}%`, ca.right - 70, py - 5);
        const qc = dark ? 'rgba(255,255,255,.13)' : 'rgba(0,0,0,.13)';
        c2.fillStyle = qc; c2.font = '600 10px sans-serif';
        c2.fillText('核心战略区', ca.right - 54, ca.top + 14);
        c2.fillText('次要痛点区', ca.left + 4, ca.bottom - 8);
        c2.restore();
      }
    }, {
      id: 'lbls',
      afterDatasetsDraw(ch) {
        const c2 = ch.ctx, { scales: {x, y}, chartArea: ca } = ch;
        c2.save(); c2.font = '500 10px sans-serif'; c2.textBaseline = 'middle';
        const FH = 11;
        const objs = pts.map(p => {
          const px2 = x.getPixelForValue(p.x), py2 = y.getPixelForValue(p.y);
          const w = c2.measureText(p.label).width + 4;
          return { label: p.label, cx: px2, cy: py2, br: p.r, lx: px2 + p.r + 5 + w/2, ly: py2, w, h: FH };
        });
        resolveOverlaps(objs);
        objs.forEach(o => {
          const lx = Math.max(ca.left + o.w/2 + 2, Math.min(ca.right - o.w/2 - 2, o.lx));
          const ly = Math.max(ca.top + o.h/2 + 2, Math.min(ca.bottom - o.h/2 - 2, o.ly));
          const dx = lx - o.cx, dy = ly - o.cy, dist = Math.sqrt(dx*dx + dy*dy) || 1;
          const ax = o.cx + (dx/dist)*(o.br + 2), ay = o.cy + (dy/dist)*(o.br + 2);
          c2.beginPath(); c2.moveTo(ax, ay);
          c2.lineTo(lx - (dx > 0 ? o.w/2 : -o.w/2), ly);
          c2.strokeStyle = cc; c2.lineWidth = 0.8; c2.stroke();
          c2.fillStyle = lc; c2.fillText(o.label, lx - o.w/2 + 2, ly);
        });
        c2.restore();
      }
    }]
  });
}

function buildCards(data, cfg) {
  const g = document.getElementById('cardGrid'); g.innerHTML = '';
  data.forEach((item, i) => {
    const c = document.createElement('div'); c.className = 'card';
    const rc = rClass(item.r);
    c.innerHTML = `
      <div class="card-top">
        <span class="rank-badge">#${i+1}</span>
        <span class="r-badge ${rc}">${item.r > 0 ? item.r.toFixed(2) : 'N/A'}</span>
      </div>
      <div class="card-name">${item.name}</div>
      <div class="bar-row">
        <div class="bar-label"><span>普及率</span><span>${item.x}%</span></div>
        <div class="bar-bg"><div class="bar-gray" style="width:${Math.min((item.x/cfg.domX)*100,100)}%"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label"><span>严重性</span><span>${item.y}%</span></div>
        <div class="bar-bg"><div class="bar-blue" style="width:${Math.min((item.y/cfg.domY)*100,100)}%"></div></div>
      </div>`;
    g.appendChild(c);
  });
}

function refresh() {
  buildBtns();
  const cfg = getAxisConfig(seg);
  const data = getData();
  updateStatus(data, cfg);
  buildChart(data, cfg);
  buildCards(data, cfg);
}

refresh();
</script>
