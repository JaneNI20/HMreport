<html lang="zh">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portable AC Solution Concept Matrix</title>
<style>
:root{
  --bg:#f8fafc;--surface:#fff;--border:rgba(0,0,0,.10);--border-mid:rgba(0,0,0,.18);
  --text:#0f172a;--text-sec:#475569;--text-hint:#94a3b8;--radius:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f1117;--surface:#1a1d27;--border:rgba(255,255,255,.10);--border-mid:rgba(255,255,255,.20);
  --text:#f0f4ff;--text-sec:#94a3b8;--text-hint:#475569;
}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;}
.page{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
h1{font-size:22px;font-weight:600;color:var(--text);margin-bottom:4px;}
.desc{font-size:13px;color:var(--text-sec);margin-bottom:1.5rem;}
.section-label{font-size:10px;font-weight:600;color:var(--text-hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.controls{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;align-items:flex-end;}
.btn-group{display:flex;flex-wrap:wrap;gap:6px;}
button.seg,button.flt,button.toggle{font-size:12px;border:1.5px solid var(--border-mid);background:var(--surface);color:var(--text-sec);cursor:pointer;padding:6px 13px;border-radius:20px;transition:all .15s;}
button.seg.active,button.flt.active{background:#2563eb;border-color:#2563eb;color:#fff;font-weight:600;box-shadow:0 0 0 3px rgba(37,99,235,.18);}
button.toggle.on{background:#0f172a;border-color:#0f172a;color:#fff;font-weight:600;}
@media(prefers-color-scheme:dark){button.toggle.on{background:#f0f4ff;border-color:#f0f4ff;color:#0f172a;}}
.status{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  margin-bottom:1.25rem;font-size:12px;color:var(--text-sec);
}
.pill{
  background:#EFF6FF;color:#1e40af;
  padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;
}
@media(prefers-color-scheme:dark){.pill{background:#1e2d4d;color:#93c5fd;}}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:10px;position:relative;}
.legend-row{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--text-hint);margin-bottom:2rem;align-items:center;}
.ld{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle;}
.list-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;display:flex;flex-direction:column;gap:7px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.rank-badge{font-size:10px;font-weight:700;color:var(--text-sec);background:var(--bg);border:1px solid var(--border);padding:2px 7px;border-radius:5px;}
.i-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;}
.i-hi{background:#FEF2F2;color:#991b1b;}
.i-mid{background:#FFFBEB;color:#92400e;}
.i-lo{background:#EFF6FF;color:#1e40af;}
@media(prefers-color-scheme:dark){
  .i-hi{background:#3d1515;color:#fca5a5;}.i-mid{background:#3d2e0a;color:#fcd34d;}.i-lo{background:#1e2d4d;color:#93c5fd;}
}
.card-name{font-size:11px;font-weight:600;color:var(--text);line-height:1.4;min-height:30px;}
.bar-row{display:flex;flex-direction:column;gap:3px;}
.bar-label{display:flex;justify-content:space-between;font-size:9px;color:var(--text-hint);}
.bar-bg{height:4px;background:var(--bg);border-radius:2px;border:1px solid var(--border);overflow:hidden;}
.bar-x{height:100%;background:#94a3b8;border-radius:2px;}
</style>
</head>

  </div>

  <div class="chart-box">
    <div style="position:relative;width:100%;height:600px;"><canvas id="mc"></canvas></div>
  </div>

  <div class="legend-row">

  </div>

  <div class="list-title" id="listTitle"></div>
  <div class="grid" id="cardGrid"></div>
</div>

const SEGS = ["Guardian", "Extreme comfort seeker", "Rational emergency prep", "小户型客厅", "小户型卧室", "大户型","小户型","总计"];
const FLTS = [{l:"全部(32)",v:"all"},{l:"Top 5",v:"top5"},{l:"Top 10",v:"top10"}];
let seg = "总计", flt = "all", chart = null, showLabels = true;
let currentCfg = null, currentPts = [];

const isDark = () => matchMedia('(prefers-color-scheme:dark)').matches;

function toggleLabels(){
  showLabels = !showLabels;
  const btn = document.getElementById('toggleLabel');
  btn.textContent = `标签：${showLabels ? '显示' : '隐藏'}`;
  btn.className = `toggle ${showLabels ? 'on' : ''}`;
  if(chart) chart.update();
}

function getAxisConfig(s){
  const all = RAW_DATA.filter(d => d.rate[s] != null && d.use[s] != null);
  const xs  = all.map(d => d.rate[s]);
  const ys  = all.map(d => d.use[s]);
  const maxX = Math.max(...xs), minX = Math.min(...xs);
  const maxY = Math.max(...ys), minY = Math.min(...ys);
  const midX = minX + (maxX - minX) / 2;
  const midY = minY + (maxY - minY) / 2;
  const domX = Math.ceil((maxX * 1.12) / 5) * 5;
  const yMin = Math.max(1.0, Math.floor((minY - 0.3) * 10) / 10);
  const domY = 5.2;
  return { domX, domY, yMin, midX, midY, maxX, minX, maxY, minY };
}

function getData(){
  let d = RAW_DATA
    .filter(r => r.rate[seg] != null && r.use[seg] != null && r.ival[seg] != null)
    .map(r => ({ name: r.name, x: r.rate[seg], y: r.use[seg], ival: r.ival[seg] }));
  d.sort((a,b) => b.ival - a.ival);
  if(flt === "top5")  return d.slice(0, 5);
  if(flt === "top10") return d.slice(0, 10);
  return d;
}

function buildBtns(){
  const sc = document.getElementById('segs'); sc.innerHTML = '';
  SEGS.forEach(s => {
    const b = document.createElement('button'); b.className = 'seg' + (s === seg ? ' active' : '');
    b.textContent = s; b.onclick = () => { seg = s; refresh(); }; sc.appendChild(b);
  });
  const fc = document.getElementById('filters'); fc.innerHTML = '';
  FLTS.forEach(f => {
    const b = document.createElement('button'); b.className = 'flt' + (f.v === flt ? ' active' : '');
    b.textContent = f.l; b.onclick = () => { flt = f.v; refresh(); }; fc.appendChild(b);
  });
}

function updateStatus(data, cfg){
  document.getElementById('sSeg').textContent = seg;
  const count = data.length;
  document.getElementById('sFlt').textContent = flt === 'all' ? `全部 ${count} 项` : flt === 'top5' ? 'Top 5' : 'Top 10';
  document.getElementById('sAxis').textContent =
    `X轴 0–${cfg.domX}% (全量 ${cfg.minX}–${cfg.maxX}%) · Y轴 有用性 · 虚线中点 X=${cfg.midX.toFixed(1)}% Y=${cfg.midY.toFixed(2)}`;
  document.getElementById('listTitle').textContent = `方案清单 — ${seg} (按 I 值降序)`;
}

// 工具函数：判断矩形是否与圆形相交（用于避让圆点）
function isRectIntersectingCircle(rect, circle) {
    const distX = Math.abs(circle.x - rect.x - rect.w / 2);
    const distY = Math.abs(circle.y - rect.y - rect.h / 2);

    if (distX > (rect.w / 2 + circle.r)) { return false; }
    if (distY > (rect.h / 2 + circle.r)) { return false; }

    if (distX <= (rect.w / 2)) { return true; }
    if (distY <= (rect.h / 2)) { return true; }

    const dx = distX - rect.w / 2;
    const dy = distY - rect.h / 2;
    return (dx * dx + dy * dy <= (circle.r * circle.r));
}

function buildChart(data, cfg){
  const dark = isDark();
  currentCfg = cfg;
  currentPts = data.map(d => ({
    x: d.x, y: d.y,
    // 气泡半径，用于图表绘制
    r: (d.ival - 2) * 6,
    // 实际像素半径，用于避让算法，增加少量 padding (2px)
    pixelR: (d.ival - 2) * 6 + 2,
    label: d.name, ival: d.ival
  }));

  const gc = dark ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.06)';
  const tc = dark ? '#94a3b8' : '#64748b';

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById('mc'), {
    type: 'bubble',
    data: { datasets: [{
      data: currentPts,
      backgroundColor: currentPts.map(p =>
        p.ival >= 3.7 ? 'rgba(239,68,68,0.7)' :
        p.ival >= 3.3 ? 'rgba(245,158,11,0.7)' :
        'rgba(59,130,246,0.7)'
      ),
      hoverBackgroundColor: currentPts.map(p =>
        p.ival >= 3.7 ? 'rgba(239,68,68,1)' :
        p.ival >= 3.3 ? 'rgba(245,158,11,1)' :
        'rgba(59,130,246,1)'
      ),
      borderWidth: 1,
      borderColor: dark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.1)'
    }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 40, right: 60, bottom: 20, left: 20 } }, // 稍微增加右侧 padding，给侧边标签留空间
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          title: items => items[0].raw.label,
          label: item => [
            `选择率: ${item.raw.x}%`,
            `有用性评分: ${item.raw.y.toFixed(2)}`,
            `I值 (买单意愿): ${item.raw.ival.toFixed(2)}`
          ]
        }}
      },
      scales: {
        x: { min: 0, max: cfg.domX,
          title: { display: true, text: '选择率 (%)', color: tc, font: { weight: 'bold' }},
          grid: { color: gc }},
        y: { min: cfg.yMin, max: cfg.domY,
          title: { display: true, text: '有用性评估 (Usefulness)', color: tc, font: { weight: 'bold' }},
          grid: { color: gc }}
      }
    },
    plugins: [
      {
        id: 'refLines',
        afterDatasetsDraw(ch){
          const {ctx, chartArea:ca, scales:{x,y}} = ch;
          ctx.save();
          ctx.setLineDash([6,4]); ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 1.2;
          const px = x.getPixelForValue(cfg.midX), py = y.getPixelForValue(cfg.midY);
          ctx.beginPath(); ctx.moveTo(px, ca.top);    ctx.lineTo(px, ca.bottom); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(ca.left, py);   ctx.lineTo(ca.right, py);  ctx.stroke();
          ctx.setLineDash([]);
          ctx.font = '600 10px sans-serif'; ctx.fillStyle = '#6366f1';
          ctx.fillText(`中点 ${cfg.midX.toFixed(1)}%`, px + 4, ca.top + 15);
          ctx.fillText(`中点 ${cfg.midY.toFixed(2)}`,   ca.right - 65, py - 6);
          const qc = dark ? 'rgba(255,255,255,.15)' : 'rgba(0,0,0,.15)';
          ctx.fillStyle = qc; ctx.font = 'italic 10px sans-serif';
          ctx.fillText('高选', ca.right - 50, ca.top + 15);
          ctx.fillText('低选', ca.left + 5,   ca.bottom - 10);
          ctx.restore();
        }
      },
      {
        id: 'staticLabels',
        // 在气泡绘制之后绘制，确保标签在气泡上方
        afterDatasetsDraw(ch){
          if(!showLabels) return;
          const {ctx, chartArea:ca, scales:{x,y}} = ch;
          const dark2 = isDark();
          ctx.save();
          ctx.font = '500 10px sans-serif';
          ctx.textBaseline = 'middle';

          // 1. 预计算所有圆点的像素坐标和半径，作为标签不能覆盖的“禁区”
          const dotExclusions = currentPts.map(p => ({
              x: x.getPixelForValue(p.x),
              y: y.getPixelForValue(p.y),
              r: p.pixelR
          }));

          // 记录已占用矩形，用于标签互不重叠算法
          const drawnRects = [];

          currentPts.forEach(p => {
            const cx = x.getPixelForValue(p.x);
            const cy = y.getPixelForValue(p.y);
            const txt = p.label;
            const tw = ctx.measureText(txt).width;
            const th = 12; // 标签高度估计
            const labelW = tw + 4;

            let finalRect = null;
            let textAlign = 'center';
            let useFallback = false;

            // 2. 多方向空间探测策略：尝试找到既不重叠气泡也不重叠其他标签的位置
            // 策略列表：[Y偏移, X偏移模式('center', 'left', 'right'), 描述]
            const strategies = [
                [-p.pixelR - th/2 - 3, 'center'], // 尝试 1: 正上方
                [p.pixelR + th/2 + 3, 'center'],  // 尝试 2: 正下方
                [0, 'left'],                      // 尝试 3: 右侧 (文字在 cx 右边)
                [0, 'right']                      // 尝试 4: 左侧 (文字在 cx 左边)
            ];

            for (const strat of strategies) {
                const [yOffset, xMode] = strat;
                let rectX, rectAlign;

                if (xMode === 'center') {
                    rectX = cx - labelW / 2;
                    rectAlign = 'center';
                } else if (xMode === 'left') {
                    rectX = cx + p.pixelR + 2;
                    rectAlign = 'left';
                } else { // xMode === 'right'
                    rectX = cx - p.pixelR - labelW - 2;
                    rectAlign = 'right';
                }

                const rectY = cy + yOffset - th / 2;

                // 构建候选矩形
                const candidateRect = {
                    x1: rectX,
                    y1: rectY,
                    x2: rectX + labelW,
                    y2: rectY + th,
                    // 用于碰撞函数的数据结构
                    x: rectX,
                    y: rectY,
                    w: labelW,
                    h: th
                };

                // 图表边界限制：不允许超出绘图区
                if (candidateRect.x1 < ca.left || candidateRect.x2 > ca.right || candidateRect.y1 < ca.top || candidateRect.y2 > ca.bottom) {
                    continue;
                }

                // A) 检查是否与其他已绘制标签重叠
                const isLabelCollision = drawnRects.some(r => {
                    return !(candidateRect.x2 < r.x1 || candidateRect.x1 > r.x2 || candidateRect.y2 < r.y1 || candidateRect.y1 > r.y2);
                });

                if (isLabelCollision) continue;

                // B) 检查是否遮挡任何气泡（圆点禁区）
                const isDotCollision = dotExclusions.some(circle => isRectIntersectingCircle(candidateRect, circle));

                if (!isDotCollision) {
                    // 找到完美位置
                    finalRect = candidateRect;
                    textAlign = rectAlign;
                    break;
                }
            }

            // 3. 兜底策略：如果所有方向探测都失败，采用“向下堆叠”模式放置在气泡上方，优先保证不重叠标签，允许遮挡气泡
            if (!finalRect) {
                useFallback = true;
                let fallbackY = cy - p.pixelR - th / 2 - 2;
                let rect = {
                    x1: cx - labelW / 2,
                    y1: fallbackY,
                    x2: cx + labelW / 2,
                    y2: fallbackY + th,
                    x: cx - labelW / 2,
                    y: fallbackY,
                    w: labelW,
                    h: th
                };

                // 兜底模式下仅进行标签重叠检测，向下挪动
                let attempts = 0;
                while (attempts < 6) {
                    const collision = drawnRects.some(r => {
                        return !(rect.x2 < r.x1 || rect.x1 > r.x2 || rect.y2 < r.y1 || rect.y1 > r.y2);
                    });

                    if (collision) {
                        rect.y1 += (th + 2); rect.y2 += (th + 2); rect.y += (th + 2);
                        attempts++;
                    } else { break; }
                }
                finalRect = rect;
                textAlign = 'center';
            }

            drawnRects.push(finalRect);

            // 4. 绘图阶段
            // 兜底模式下使用更深的背景，确保遮挡气泡时文字可读
            const bgColorFallback = dark2 ? 'rgba(15,17,23, 0.95)' : 'rgba(255,255,255, 0.95)';
            const bgColorStandard = dark2 ? 'rgba(26,29,39, 0.8)' : 'rgba(255,255,255, 0.8)';
            ctx.fillStyle = useFallback ? bgColorFallback : bgColorStandard;
            ctx.fillRect(finalRect.x1, finalRect.y1, labelW, th);

            ctx.fillStyle = dark2 ? '#f0f4ff' : '#0f172a';
            // 轻微的斜体以区分兜底标签
            if(useFallback) ctx.font = 'italic 500 10px sans-serif';
            else ctx.font = '500 10px sans-serif';

            let textX;
            if (textAlign === 'center') textX = finalRect.x1 + 2;
            else if (textAlign === 'left') textX = finalRect.x1 + 2;
            else textX = finalRect.x1 + 2; //textAlign === 'right'

            ctx.fillText(txt, textX, finalRect.y1 + th / 2);
          });
          ctx.restore();
        }
      }
    ]
  });
}

function buildCards(data, cfg){
  const g = document.getElementById('cardGrid'); g.innerHTML = '';
  data.forEach((item, i) => {
    const c = document.createElement('div'); c.className = 'card';
    const iClass = item.ival >= 3.7 ? 'i-hi' : item.ival >= 3.3 ? 'i-mid' : 'i-lo';
    c.innerHTML = `
      <div class="card-top">
        <span class="rank-badge">#${i+1}</span>
        <span class="i-badge ${iClass}">I值 ${item.ival.toFixed(2)}</span>
      </div>
      <div class="card-name">${item.name}</div>
      <div class="bar-row">
        <div class="bar-label"><span>有用性评分</span><span>${item.y.toFixed(1)} / 5</span></div>
        <div class="bar-bg"><div class="bar-x" style="width:${(item.y/5)*100}%;background:#2563eb;"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label"><span>选择率</span><span>${item.x}%</span></div>
        <div class="bar-bg"><div class="bar-x" style="width:${(item.x/cfg.domX)*100}%;"></div></div>
      </div>`;
    g.appendChild(c);
  });
}

function refresh(){
  buildBtns();
  const cfg  = getAxisConfig(seg);
  const data = getData();
  updateStatus(data, cfg);
  buildChart(data, cfg);
  buildCards(data, cfg);
}

window.addEventListener('resize', () => chart && chart.resize());
refresh();
</script>
