<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portable AC Solution Concept Matrix</title>
<style>
:root{
  --bg:#f8fafc;--surface:#fff;--border:rgba(0,0,0,.10);--border-mid:rgba(0,0,0,.18);
  --text:#0f172a;--text-sec:#475569;--text-hint:#94a3b8;--radius:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f1117;--surface:#1a1d27;--border:rgba(255,255,255,.10);--border-mid:rgba(255,255,255,.20);
  --text:#f0f4ff;--text-sec:#94a3b8;--text-hint:#475569;
}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;}
.page{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
h1{font-size:22px;font-weight:600;color:var(--text);margin-bottom:4px;}
.desc{font-size:13px;color:var(--text-sec);margin-bottom:1.5rem;}
.section-label{font-size:10px;font-weight:600;color:var(--text-hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.controls{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;align-items:flex-end;}
.btn-group{display:flex;flex-wrap:wrap;gap:6px;}
button.seg,button.flt,button.toggle{font-size:12px;border:1.5px solid var(--border-mid);background:var(--surface);color:var(--text-sec);cursor:pointer;padding:6px 13px;border-radius:20px;transition:all .15s;}
button.seg.active,button.flt.active{background:#2563eb;border-color:#2563eb;color:#fff;font-weight:600;box-shadow:0 0 0 3px rgba(37,99,235,.18);}
button.toggle.on{background:#0f172a;border-color:#0f172a;color:#fff;font-weight:600;}
@media(prefers-color-scheme:dark){button.toggle.on{background:#f0f4ff;border-color:#f0f4ff;color:#0f172a;}}
.status{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  margin-bottom:1.25rem;font-size:12px;color:var(--text-sec);
}
.pill{
  background:#EFF6FF;color:#1e40af;
  padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;
}
@media(prefers-color-scheme:dark){.pill{background:#1e2d4d;color:#93c5fd;}}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:10px;position:relative;}
.legend-row{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--text-hint);margin-bottom:2rem;align-items:center;}
.ld{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle;}
.list-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;display:flex;flex-direction:column;gap:7px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.rank-badge{font-size:10px;font-weight:700;color:var(--text-sec);background:var(--bg);border:1px solid var(--border);padding:2px 7px;border-radius:5px;}
.i-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;}
.i-hi{background:#FEF2F2;color:#991b1b;}
.i-mid{background:#FFFBEB;color:#92400e;}
.i-lo{background:#EFF6FF;color:#1e40af;}
@media(prefers-color-scheme:dark){
  .i-hi{background:#3d1515;color:#fca5a5;}.i-mid{background:#3d2e0a;color:#fcd34d;}.i-lo{background:#1e2d4d;color:#93c5fd;}
}
.card-name{font-size:11px;font-weight:600;color:var(--text);line-height:1.4;min-height:30px;}
.bar-row{display:flex;flex-direction:column;gap:3px;}
.bar-label{display:flex;justify-content:space-between;font-size:9px;color:var(--text-hint);}
.bar-bg{height:4px;background:var(--bg);border-radius:2px;border:1px solid var(--border);overflow:hidden;}
.bar-x{height:100%;background:#94a3b8;border-radius:2px;}
</style>
</head>
<body>
<div class="page">
  <h1>Portable AC Solution Concept Matrix</h1>
  <p class="desc">X轴 = 感兴趣(%) · Y轴 = I值(买单意愿) · 虚线 = 极差中点</p>

  <div class="controls">
    <div><div class="section-label">画像</div><div class="btn-group" id="segs"></div></div>
    <div><div class="section-label">显示数量 (依I值)</div><div class="btn-group" id="filters"></div></div>
    <div>
      <div class="section-label">全局常驻标签</div>
      <div class="btn-group">
        <button class="toggle on" id="toggleLabel" onclick="toggleLabels()">标签：显示</button>
      </div>
    </div>
  </div>

  <div class="status">
    当前：<span class="pill" id="sSeg"></span>
    <span style="color:var(--border-mid)">·</span>
    <span class="pill" id="sFlt"></span>
    <span style="color:var(--border-mid)">·</span>
    <span id="sAxis" style="font-size:11px;color:var(--text-hint);"></span>
  </div>

  <div class="chart-box">
    <div style="position:relative;width:100%;height:600px;"><canvas id="mc"></canvas></div>
  </div>

  <div class="legend-row">
    <span><span class="ld" style="background:rgba(239,68,68,.8)"></span>I值 ≥ 3.7 高优先级</span>
    <span><span class="ld" style="background:rgba(245,158,11,.8)"></span>I值 3.3–3.7 中优先级</span>
    <span><span class="ld" style="background:rgba(37,99,235,.8)"></span>I值 &lt; 3.3 一般</span>
  </div>

  <div class="list-title" id="listTitle"></div>
  <div class="grid" id="cardGrid"></div>
</div>

  {id:31,name:"Foam window panel",segments:{"Guardian":{x:7,y:3.8,r:3.3},"Extreme comfort seeker":{x:9,y:4.0,r:3.2},"Rational emergency prep":{x:14,y:4.0,r:3.1},"小户型客厅":{x:3,y:2.0,r:3.2},"小户型卧室":{x:14,y:4.6,r:3.3},"小户型":{x:9,y:4.3,r:3.3},"大户型":{x:9,y:3.9,r:3.2},"总计":{x:10,y:4.0,r:3.2}}},
  {id:32,name:"Washable filter",segments:{"Guardian":{x:21,y:4.6,r:3.6},"Extreme comfort seeker":{x:28,y:4.3,r:3.4},"Rational emergency prep":{x:17,y:4.4,r:3.1},"小户型客厅":{x:25,y:4.3,r:3.4},"小户型卧室":{x:14,y:4.6,r:3.5},"小户型":{x:20,y:4.3,r:3.3},"大户型":{x:25,y:4.5,r:3.4},"总计":{x:23,y:4.4,r:3.4}}}
];

const SEGS=["Guardian","Extreme comfort seeker","Rational emergency prep","小户型客厅","小户型卧室","大户型","小户型","总计"];
const FLTS=[{l:"全部",v:"all"},{l:"Top 5",v:"top5"},{l:"Top 10",v:"top10"}];
let seg="总计", flt="all", chart=null, showLabels=true;
let currentCfg=null, currentPts=[];

const isDark=()=>matchMedia('(prefers-color-scheme:dark)').matches;

function toggleLabels(){
  showLabels=!showLabels;
  const btn=document.getElementById('toggleLabel');
  btn.textContent=`标签：${showLabels?'显示':'隐藏'}`;
  btn.className=`toggle ${showLabels?'on':''}`;
  if(chart) chart.update();
}

function getAxisConfig(s){
  const valid=RAW.filter(d=>d.rate[s]!=null&&d.ival[s]!=null);
  const xs=valid.map(d=>d.rate[s]), ys=valid.map(d=>d.ival[s]);
  const maxX=Math.max(...xs), minX=Math.min(...xs);
  const maxY=Math.max(...ys), minY=Math.min(...ys);
  const domX=Math.ceil((maxX*1.2)/5)*5;
  const domY=parseFloat((Math.ceil((maxY*1.1)*10)/10).toFixed(1));
  const midX=minX+(maxX-minX)/2;
  const midY=minY+(maxY-minY)/2;
  return{domX,domY,midX,midY,minY};
}

function getData(){
  let d=RAW.filter(r=>r.rate[seg]!=null&&r.ival[seg]!=null)
    .map(r=>({name:r.name,x:r.rate[seg],y:r.ival[seg]}));
  d.sort((a,b)=>b.y-a.y);
  if(flt==="top5") return d.slice(0,5);
  if(flt==="top10") return d.slice(0,10);
  return d;
}

function buildBtns(){
  const sc=document.getElementById('segs'); sc.innerHTML='';
  SEGS.forEach(s=>{
    const b=document.createElement('button'); b.className='seg'+(s===seg?' active':'');
    b.textContent=s; b.onclick=()=>{seg=s; refresh();}; sc.appendChild(b);
  });
  const fc=document.getElementById('filters'); fc.innerHTML='';
  FLTS.forEach(f=>{
    const b=document.createElement('button'); b.className='flt'+(f.v===flt?' active':'');
    b.textContent=f.l; b.onclick=()=>{flt=f.v; refresh();}; fc.appendChild(b);
  });
}

function updateStatus(data, cfg){
  document.getElementById('sSeg').textContent = seg;
  const count = data.length;
  const fltLabel = flt==='all' ? `全部 ${count} 个方案`
                 : flt==='top5' ? `Top 5（${count} 个）`
                 : `Top 10（${count} 个）`;
  document.getElementById('sFlt').textContent = fltLabel;
  document.getElementById('sAxis').textContent =
    `X轴 0–${cfg.domX}% · Y轴 ${cfg.minY.toFixed(1)}–${cfg.domY} · 象限中点 X=${cfg.midX.toFixed(1)}% Y=${cfg.midY.toFixed(2)}`;
  document.getElementById('listTitle').textContent =
    `方案清单 — ${seg} · ${flt==='all'?`全部 ${count} 项`:flt==='top5'?'Top 5':'Top 10'} · 按 I 值排序`;
}

function buildChart(data, cfg){
  const dark=isDark();
  currentCfg=cfg;
  currentPts=data.map(d=>({x:d.x,y:d.y,label:d.name,iVal:d.y}));

  const gc=dark?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)';
  const tc=dark?'#94a3b8':'#64748b';

  if(chart) chart.destroy();

  const positioner = function(elements, eventPosition){
    if(!elements.length) return false;
    const el=elements[0];
    return{x:el.element.x, y:el.element.y-14};
  };
  Chart.Tooltip.positioners.abovePoint=positioner;

  chart=new Chart(document.getElementById('mc'),{
    type:'scatter',
    data:{datasets:[{
      data:currentPts,
      pointRadius:7,
      pointHoverRadius:10,
      hitRadius:10,
      backgroundColor:currentPts.map(p=>p.iVal>=3.7?'#ef4444':p.iVal>=3.3?'#f59e0b':'#3b82f6'),
      borderWidth:1.5,
      borderColor:'#fff'
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{padding:30},
      interaction:{mode:'nearest', intersect:true},
      plugins:{
        legend:{display:false},
        tooltip:{
          enabled:true,
          position:'abovePoint',
          padding:10,
          backgroundColor:dark?'rgba(15,23,42,0.97)':'rgba(255,255,255,0.97)',
          titleColor:dark?'#f1f5f9':'#0f172a',
          titleFont:{size:12,weight:'bold'},
          bodyColor:dark?'#94a3b8':'#475569',
          bodyFont:{size:11},
          borderColor:dark?'#334155':'#cbd5e1',
          borderWidth:1,
          cornerRadius:7,
          displayColors:false,
          caretSize:5,
          caretPadding:6,
          callbacks:{
            title:items=>items[0].raw.label,
            label:item=>[`选择率: ${item.raw.x}%`,`I值: ${item.raw.y.toFixed(2)}`]
          }
        }
      },
      scales:{
        x:{min:0,max:cfg.domX,title:{display:true,text:'选择率 (%)',color:tc},grid:{color:gc}},
        y:{min:Math.floor((cfg.minY-0.1)*10)/10,max:cfg.domY,title:{display:true,text:'I值',color:tc},grid:{color:gc}}
      }
    },
    plugins:[
      {
        id:'refLines',
        afterDatasetsDraw(ch){
          const {ctx,chartArea:ca,scales:{x,y}}=ch;
          ctx.save();
          ctx.setLineDash([6,4]); ctx.strokeStyle='#6366f1'; ctx.lineWidth=1.5;
          const px=x.getPixelForValue(cfg.midX), py=y.getPixelForValue(cfg.midY);
          ctx.beginPath(); ctx.moveTo(px,ca.top); ctx.lineTo(px,ca.bottom); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(ca.left,py); ctx.lineTo(ca.right,py); ctx.stroke();
          ctx.setLineDash([]);
          ctx.font='600 10px sans-serif'; ctx.fillStyle='#6366f1';
          ctx.fillText(`中点 ${cfg.midX.toFixed(1)}%`, px+4, ca.top+14);
          ctx.fillText(`中点 ${cfg.midY.toFixed(2)}`, ca.right-68, py-6);
          const qc=dark?'rgba(255,255,255,.12)':'rgba(0,0,0,.12)';
          ctx.fillStyle=qc; ctx.font='600 10px sans-serif';
          ctx.fillText('高选择·高I值', ca.right-60, ca.top+14);
          ctx.fillText('低选择·低I值', ca.left+4, ca.bottom-8);
          ctx.restore();
        }
      },
      {
        id:'staticLabels',
        afterDatasetsDraw(ch){
          if(!showLabels) return;
          const {ctx,chartArea:ca,scales:{x,y}}=ch;
          const dark2=isDark();
          const labelBg=dark2?'rgba(15,23,42,0.97)':'rgba(255,255,255,0.97)';
          const labelColor=dark2?'rgba(220,235,255,.95)':'rgba(10,20,50,.90)';
          const connColor=dark2?'rgba(148,163,184,.4)':'rgba(71,85,105,.35)';

          ctx.save();
          ctx.font='500 10px -apple-system,BlinkMacSystemFont,sans-serif';
          ctx.textBaseline='middle';

          const objs=currentPts.map(p=>{
            const cx=x.getPixelForValue(p.x), cy=y.getPixelForValue(p.y);
            const txt=p.label;
            const w=ctx.measureText(txt).width+8;
            const h=13;
            return{txt,cx,cy,lx:cx+w/2+10,ly:cy-10,w,h};
          });

          for(let it=0;it<200;it++){
            let moved=false;
            for(let i=0;i<objs.length;i++){
              for(let j=i+1;j<objs.length;j++){
                const a=objs[i],b=objs[j];
                const ox=(a.w/2+b.w/2+3)-Math.abs(a.lx-b.lx);
                const oy=(a.h/2+b.h/2+3)-Math.abs(a.ly-b.ly);
                if(ox>0&&oy>0){
                  const dx=a.lx-b.lx||.01, dy=a.ly-b.ly||.01;
                  const d=Math.sqrt(dx*dx+dy*dy)||1;
                  a.lx+=(ox/2)*(dx/d); a.ly+=(oy/2)*(dy/d);
                  b.lx-=(ox/2)*(dx/d); b.ly-=(oy/2)*(dy/d);
                  moved=true;
                }
              }
            }
            if(!moved) break;
          }

          objs.forEach(o=>{
            const lx=Math.max(ca.left+o.w/2+2,Math.min(ca.right-o.w/2-2,o.lx));
            const ly=Math.max(ca.top+o.h/2+2,Math.min(ca.bottom-o.h/2-2,o.ly));
            const dx=lx-o.cx, dy=ly-o.cy, dist=Math.sqrt(dx*dx+dy*dy)||1;
            if(dist>14){
              ctx.beginPath();
              ctx.moveTo(o.cx+(dx/dist)*8, o.cy+(dy/dist)*8);
              ctx.lineTo(lx-(dx>0?o.w/2:-o.w/2), ly);
              ctx.strokeStyle=connColor; ctx.lineWidth=1.0; ctx.stroke();
            }
            ctx.fillStyle=labelBg;
            ctx.beginPath();
            ctx.roundRect(lx-o.w/2, ly-o.h/2, o.w, o.h, 3);
            ctx.fill();
            ctx.strokeStyle=dark2?'rgba(255,255,255,.12)':'rgba(0,0,0,.10)';
            ctx.lineWidth=0.5; ctx.stroke();
            ctx.fillStyle=labelColor;
            ctx.fillText(o.txt, lx-o.w/2+4, ly);
          });

          ctx.restore();
        }
      }
    ]
  });
}

function buildCards(data,cfg){
  const g=document.getElementById('cardGrid'); g.innerHTML='';
  data.forEach((item,i)=>{
    const c=document.createElement('div'); c.className='card';
    c.innerHTML=`
      <div class="card-top"><span class="rank-badge">#${i+1}</span><span class="i-badge ${item.y>=3.7?'i-hi':item.y>=3.3?'i-mid':'i-lo'}">I值 ${item.y.toFixed(2)}</span></div>
      <div class="card-name">${item.name}</div>
      <div class="bar-row">
        <div class="bar-label"><span>选择率</span><span>${item.x}%</span></div>
        <div class="bar-bg"><div class="bar-x" style="width:${(item.x/cfg.domX)*100}%"></div></div>
      </div>`;
    g.appendChild(c);
  });
}

function refresh(){
  buildBtns();
  const cfg=getAxisConfig(seg);
  const data=getData();
  updateStatus(data, cfg);
  buildChart(data,cfg);
  buildCards(data,cfg);
}

window.addEventListener('resize',()=>chart&&chart.resize());
refresh();
</script>
